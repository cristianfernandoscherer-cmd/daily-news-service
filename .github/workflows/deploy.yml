name: Deploy to AWS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify AWS credentials
        run: |
          echo "Verificando credenciais AWS..."
          aws sts get-caller-identity

      - name: Verify project structure
        run: |
          echo "Verificando arquivos principais..."
          ls -la go.mod Makefile iac_template.yaml
          ls -la cmd/lambdas/feed-parser/

      - name: Set bucket name
        id: bucket
        run: |
          BUCKET_NAME="daily-news-deploy-bucket-891612551514"
          echo "Bucket name: $BUCKET_NAME"
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Clean up stacks in ROLLBACK_COMPLETE
        continue-on-error: true
        run: |
          echo "Verificando stacks corrompidos..."
          
          # Lista de stacks para validar
          STACKS=("aws-sam-cli-managed-default" "daily-news-service-prod")
          
          for STACK in "${STACKS[@]}"; do
            STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --region us-east-1 --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
            echo "Stack: $STACK, Status: $STATUS"
            
            if [ "$STATUS" == "ROLLBACK_COMPLETE" ] || [ "$STATUS" == "ROLLBACK_FAILED" ]; then
              echo "🗑️ Deletando stack $STACK pois está em $STATUS..."
              aws cloudformation delete-stack --stack-name $STACK --region us-east-1
              aws cloudformation wait stack-delete-complete --stack-name $STACK --region us-east-1
              echo "✅ Stack $STACK deletado."
            fi
          done

      - name: Build SAM application
        run: |
          echo "Iniciando build (usando root Makefile)..."
          sam build --template iac_template.yaml --use-container

      - name: Deploy SAM application
        id: deploy
        run: |
          echo "Iniciando deploy..."
          sam deploy \
            --stack-name daily-news-service-prod \
            --s3-bucket ${{ steps.bucket.outputs.bucket_name }} \
            --s3-prefix daily-news-prod \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides Environment=prod \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region us-east-1

      - name: Final status
        if: always()
        run: |
          if [ "${{ steps.deploy.conclusion }}" == "success" ]; then
            echo "✅ DEPLOY CONCLUÍDO COM SUCESSO"
            exit 0
          else
            echo "❌ DEPLOY FALHOU"
            exit 1
          fi