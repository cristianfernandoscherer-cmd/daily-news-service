name: Deploy to AWS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify AWS credentials
        run: |
          echo "Verificando credenciais AWS..."
          aws sts get-caller-identity

      # Verificar estrutura do projeto
      - name: Check project structure
        run: |
          echo "Estrutura do projeto:"
          find cmd -type f -name "*.go" | sort
          echo ""
          echo "Arquivos na pasta feed-parser:"
          ls -la cmd/lambdas/feed-parser/

      # Criar Makefile com a formatação correta (usando TAB, não espaços)
      - name: Create Makefile for Go build
        run: |
          MAKEFILE_PATH="cmd/lambdas/feed-parser/Makefile"
          
          echo "Criando Makefile em $MAKEFILE_PATH..."
          
          # Usar printf para garantir tabs
          printf 'build-FeedParserFunction:\n\tGOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap ./...\n\tcp bootstrap $(ARTIFACTS_DIR)/\n' > $MAKEFILE_PATH
          
          echo "Makefile criado. Conteúdo:"
          cat -A $MAKEFILE_PATH  # Mostra caracteres especiais incluindo tabs
          
          echo ""
          echo "Verificando se o main.go existe:"
          if [ -f cmd/lambdas/feed-parser/main.go ]; then
            echo "✅ main.go encontrado"
          else
            echo "❌ main.go NÃO encontrado!"
            echo "Procurando arquivos .go:"
            find cmd -name "*.go"
            exit 1
          fi

      - name: Set bucket name
        id: bucket
        run: |
          BUCKET_NAME="daily-news-deploy-bucket-891612551514"
          echo "Bucket name: $BUCKET_NAME"
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Clean up SAM managed stack
        continue-on-error: true
        run: |
          echo "Verificando stack aws-sam-cli-managed-default..."
          if aws cloudformation describe-stacks --stack-name aws-sam-cli-managed-default 2>/dev/null; then
            echo "Deletando stack..."
            aws cloudformation delete-stack --stack-name aws-sam-cli-managed-default
            aws cloudformation wait stack-delete-complete --stack-name aws-sam-cli-managed-default
          fi

      # Build com SAM
      - name: Build SAM application
        run: |
          echo "Build da aplicação..."
          sam build --template iac_template.yaml --use-container

      # Deploy com SAM
      - name: Deploy SAM application
        run: |
          echo "Deploy da aplicação..."
          sam deploy \
            --stack-name daily-news-service-prod \
            --s3-bucket ${{ steps.bucket.outputs.bucket_name }} \
            --s3-prefix daily-news-prod \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides Environment=prod \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region us-east-1