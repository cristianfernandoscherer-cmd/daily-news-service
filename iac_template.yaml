AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  Daily News Service — Serverless application that fetches, summarizes,
  and ranks daily tech news using Amazon Bedrock and stores results in DynamoDB.

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - x86_64
    Timeout: 300
    MemorySize: 256
    Environment:
      Variables:
        AWS_REGION_NAME: !Ref AWS::Region
        DYNAMODB_TABLE_NAME: !Ref ArticlesTable
        DYNAMODB_ENDPOINT: !Ref DynamoDBEndpoint
        BEDROCK_MODEL_ID: !If [IsProd, '{{resolve:ssm:/daily-news/prod/bedrock-model-id}}', !Ref BedrockModelId]
        LOG_LEVEL: !If [IsProd, '{{resolve:ssm:/daily-news/prod/log-level}}', !Ref LogLevel]
        TOP_N_ARTICLES: !If [IsProd, '{{resolve:ssm:/daily-news/prod/top-n-articles}}', !Ref TopNArticles]
        USE_MOCK_LLM: !If [IsProd, '{{resolve:ssm:/daily-news/prod/use-mock-llm}}', !Ref UseMockLLM]
        ENVIRONMENT: !Ref Environment

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  DynamoDBEndpoint:
    Type: String
    Default: ""
    Description: Custom endpoint for DynamoDB (used for LocalStack)

  BedrockModelId:
    Type: String
    Default: "anthropic.claude-3-haiku-20240307-v1:0"
    Description: Amazon Bedrock model ID for summarization

  LogLevel:
    Type: String
    Default: info
    AllowedValues: [debug, info, warn, error]

  TopNArticles:
    Type: Number
    Default: 5
    Description: Number of top articles to save per run

  UseMockLLM:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Resources:
  # ─── DynamoDB Table ────────────────────────────────────────────────────────
  ArticlesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "daily-news-articles-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: fetched_at
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: fetched_at
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: fetched_at-index
          KeySchema:
            - AttributeName: fetched_at
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: daily-news-service

  # ─── IAM Role shared by all Lambda functions ───────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "daily-news-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt ArticlesTable.Arn
                  - !Sub "${ArticlesTable.Arn}/index/*"
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
        - PolicyName: LambdaInvokeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: "*"

  # ─── Feed Parser Lambda ────────────────────────────────────────────────────
  FeedParserFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile  # Mudado de go1.x para makefile
    Properties:
      FunctionName: !Sub "daily-news-feed-parser-${Environment}"
      CodeUri: cmd/lambdas/feed-parser/
      Handler: bootstrap
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Fetches, summarizes, and ranks daily tech news"
      Events:
        DailySchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub "daily-news-trigger-${Environment}"
            Description: "Triggers daily news fetch at 7AM UTC"
            ScheduleExpression: "cron(0 10 * * ? *)"
            State: ENABLED
            RetryPolicy:
              MaximumRetryAttempts: 2

Outputs:
  ArticlesTableName:
    Description: DynamoDB table name for articles
    Value: !Ref ArticlesTable
    Export:
      Name: !Sub "${AWS::StackName}-ArticlesTable"

  FeedParserFunctionArn:
    Description: Feed Parser Lambda ARN
    Value: !GetAtt FeedParserFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FeedParserFunctionArn"